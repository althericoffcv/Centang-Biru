  <!-- ================================================= -->
  <!-- STYLE -->

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;

      background:
      radial-gradient(circle at top,#2563eb 0%,#0f172a 45%,#020617 100%);

      display:flex;
      justify-content:center;
      align-items:center;

      overflow:hidden;

      color:white;

      position:relative;
    }

    .blur{
      position:absolute;

      width:700px;
      height:700px;

      background:#3b82f6;

      border-radius:50%;

      filter:blur(200px);

      opacity:.18;

      top:-300px;
      right:-150px;
    }

    .card{

      width:430px;

      padding:45px;

      border-radius:30px;

      background:rgba(255,255,255,.06);

      border:1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(20px);

      text-align:center;

      z-index:2;

      box-shadow:
      0 0 40px rgba(59,130,246,.25),
      inset 0 0 20px rgba(255,255,255,.03);

    }

    .logo{

      width:130px;
      height:130px;

      border-radius:50%;

      object-fit:cover;

      margin-bottom:25px;

      box-shadow:
      0 0 45px rgba(59,130,246,.8);

      animation:float 4s ease-in-out infinite;

    }

    h1{
      font-size:44px;
      margin-bottom:12px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      margin-bottom:30px;
      font-size:16px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn{

      padding:14px 30px;

      border-radius:14px;

      text-decoration:none;

      transition:.3s;

      font-weight:bold;

    }

    .primary{

      background:#2563eb;

      color:white;

      box-shadow:
      0 0 25px rgba(37,99,235,.45);

    }

    .primary:hover{
      background:#3b82f6;
      transform:translateY(-4px);
    }

    .secondary{

      background:rgba(255,255,255,.08);

      border:1px solid rgba(255,255,255,.08);

      color:white;

    }

    .secondary:hover{
      background:rgba(255,255,255,.12);
      transform:translateY(-4px);
    }

    .verified{

      margin-top:25px;

      display:flex;
      justify-content:center;
      align-items:center;

      gap:8px;

      color:#60a5fa;

      font-size:14px;

    }

    .verified img{
      width:18px;
      height:18px;
      border-radius:50%;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    @media(max-width:500px){

      .card{
        width:92%;
        padding:35px 25px;
      }

      h1{
        font-size:36px;
      }

    }

  </style>

</head>

<body>

  <div class="blur"></div>

  <div class="card">

    <img
      class="logo"
      src="https://ik.imagekit.io/skyazsifv/20260529_052413.png"
      alt="Verified"
    >

    <h1>Altheric Verified</h1>

    <p>
      Website dengan full Open Graph support,
      WhatsApp preview,
      Discord embed,
      Twitter card,
      dan verified favicon support.
    </p>

    <div class="buttons">

      <a href="#" class="btn primary">
        Get Started
      </a>

      <a href="#" class="btn secondary">
        Learn More
      </a>

    </div>

    <div class="verified">

      <img
        src="https://ik.imagekit.io/skyazsifv/20260529_052413.png"
      >

      Verified Secure Website

    </div>

  </div>

</body>
</html>
