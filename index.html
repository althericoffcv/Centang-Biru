<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- FAVICON -->
  <link
    rel="icon"
    type="image/png"
    sizes="300x300"
    href="https://ik.imagekit.io/skyazsifv/20260529_052413.png"
  />

  <title>Blue Verified</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .box{
      text-align:center;
      padding:40px;
    }

    .logo{
      width:120px;
      height:120px;
      border-radius:50%;
      margin-bottom:20px;
      box-shadow:0 0 50px #3b82f6;
      animation:float 3s ease-in-out infinite;
    }

    h1{
      font-size:50px;
      margin-bottom:10px;
    }

    p{
      color:#94a3b8;
      font-size:18px;
    }

    .btn{
      display:inline-block;
      margin-top:25px;
      padding:14px 35px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:14px;
      transition:.3s;
      font-weight:bold;
    }

    .btn:hover{
      background:#3b82f6;
      transform:scale(1.05);
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0px);
      }
    }
  </style>
</head>
<body>

  <div class="box">
    <img
      class="logo"
      src="https://ik.imagekit.io/skyazsifv/20260529_052413.png"
      alt="Verified"
    />

    <h1>Verified Site</h1>
    <p>Favicon menggunakan centang biru custom.</p>

    <a href="#" class="btn">Continue</a>
  </div>

</body>
</html>
