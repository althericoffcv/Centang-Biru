<!DOCTYPE html>
<html lang="en">
<head>

  <!-- BASIC -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Altheric Verified</title>

  <meta
    name="description"
    content="Modern verified website with SVG blue check favicon."
  >

  <!-- ================================================= -->
  <!-- SVG FAVICON -->
  <!-- ================================================= -->

  <link
    rel="icon"
    type="image/svg+xml"
    href="/favicon.svg"
  >

  <!-- PNG FALLBACK -->
  <link
    rel="alternate icon"
    href="/favicon.png"
  >

  <!-- ================================================= -->
  <!-- OPEN GRAPH -->
  <!-- ================================================= -->

  <meta property="og:type" content="website">

  <meta
    property="og:title"
    content="Altheric Verified"
  >

  <meta
    property="og:description"
    content="Modern verified website with SVG verified favicon."
  >

  <meta
    property="og:image"
    content="https://altheric-verified.vercel.app/og.png"
  >

  <meta
    property="og:url"
    content="https://altheric-verified.vercel.app"
  >

  <meta
    property="og:site_name"
    content="Altheric Verified"
  >

  <!-- TWITTER -->

  <meta
    name="twitter:card"
    content="summary_large_image"
  >

  <meta
    name="twitter:title"
    content="Altheric Verified"
  >

  <meta
    name="twitter:description"
    content="Modern verified website with SVG verified favicon."
  >

  <meta
    name="twitter:image"
    content="https://altheric-verified.vercel.app/og.png"
  >

  <!-- MOBILE -->

  <meta name="theme-color" content="#1d9bf0">

  <!-- ================================================= -->
  <!-- STYLE -->
  <!-- ================================================= -->

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;

      background:
      radial-gradient(circle at top,#2563eb 0%,#0f172a 45%,#020617 100%);

      display:flex;
      justify-content:center;
      align-items:center;

      overflow:hidden;

      color:white;

      position:relative;
    }

    .blur{
      position:absolute;

      width:700px;
      height:700px;

      background:#3b82f6;

      border-radius:50%;

      filter:blur(200px);

      opacity:.18;

      top:-300px;
      right:-150px;
    }

    .card{

      width:430px;

      padding:45px;

      border-radius:30px;

      background:rgba(255,255,255,.06);

      border:1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(20px);

      text-align:center;

      z-index:2;

      box-shadow:
      0 0 40px rgba(59,130,246,.25),
      inset 0 0 20px rgba(255,255,255,.03);

    }

    .logo{

      width:130px;
      height:130px;

      margin:auto;

      margin-bottom:25px;

      animation:float 4s ease-in-out infinite;

      filter:
      drop-shadow(0 0 30px rgba(59,130,246,.75));
    }

    h1{
      font-size:44px;
      margin-bottom:12px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      margin-bottom:30px;
      font-size:16px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn{

      padding:14px 30px;

      border-radius:14px;

      text-decoration:none;

      transition:.3s;

      font-weight:bold;

    }

    .primary{

      background:#2563eb;

      color:white;

      box-shadow:
      0 0 25px rgba(37,99,235,.45);

    }

    .primary:hover{
      background:#3b82f6;
      transform:translateY(-4px);
    }

    .secondary{

      background:rgba(255,255,255,.08);

      border:1px solid rgba(255,255,255,.08);

      color:white;

    }

    .secondary:hover{
      background:rgba(255,255,255,.12);
      transform:translateY(-4px);
    }

    .verified{

      margin-top:25px;

      display:flex;
      justify-content:center;
      align-items:center;

      gap:8px;

      color:#60a5fa;

      font-size:14px;

    }

    .verified svg{
      width:18px;
      height:18px;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    @media(max-width:500px){

      .card{
        width:92%;
        padding:35px 25px;
      }

      h1{
        font-size:36px;
      }

    }

  </style>

</head>

<body>

  <div class="blur"></div>

  <div class="card">

    <!-- SVG LOGO -->

    <svg
      class="logo"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 256 256"
    >

      <defs>

        <linearGradient
          id="blueGradient"
          x1="0%"
          y1="0%"
          x2="100%"
          y2="100%"
        >

          <stop offset="0%" stop-color="#4cc2ff"/>

          <stop offset="100%" stop-color="#1d9bf0"/>

        </linearGradient>

        <filter
          id="shadow"
          x="-50%"
          y="-50%"
          width="200%"
          height="200%"
        >

          <feDropShadow
            dx="0"
            dy="8"
            stdDeviation="10"
            flood-color="#1d9bf0"
            flood-opacity="0.45"
          />

        </filter>

      </defs>

      <!-- BACKGROUND -->

      <circle
        cx="128"
        cy="128"
        r="120"
        fill="url(#blueGradient)"
        filter="url(#shadow)"
      />

      <!-- LIGHT -->

      <ellipse
        cx="95"
        cy="80"
        rx="55"
        ry="28"
        fill="white"
        opacity="0.18"
        transform="rotate(-18 95 80)"
      />

      <!-- CHECK -->

      <path
        d="M72 136L109 173L188 92"
        fill="none"
        stroke="white"
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

    </svg>

    <h1>Altheric Verified</h1>

    <p>
      Website dengan SVG verified favicon,
      WhatsApp preview,
      Discord embed,
      Twitter card,
      dan modern social metadata support.
    </p>

    <div class="buttons">

      <a href="#" class="btn primary">
        Get Started
      </a>

      <a href="#" class="btn secondary">
        Learn More
      </a>

    </div>

    <div class="verified">

      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 256 256"
      >

        <circle
          cx="128"
          cy="128"
          r="120"
          fill="#1d9bf0"
        />

        <path
          d="M72 136L109 173L188 92"
          fill="none"
          stroke="white"
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"
        />

      </svg>

      Verified Secure Website

    </div>

  </div>

</body>
</html>
