<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- FAVICON CENTANG BIRU -->
  <link
    rel="icon"
    type="image/png"
    sizes="300x300"
    href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Twitter_Verified_Badge.svg/300px-Twitter_Verified_Badge.svg.png"
  />

  <title>Blue Check Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .container{
      text-align:center;
    }

    .badge{
      width:120px;
      height:120px;
      border-radius:50%;
      box-shadow:0 0 40px #3b82f6;
      margin-bottom:20px;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
    }

    p{
      color:#94a3b8;
      font-size:18px;
    }

    .btn{
      display:inline-block;
      margin-top:25px;
      padding:14px 30px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:12px;
      transition:0.3s;
      font-weight:bold;
    }

    .btn:hover{
      background:#3b82f6;
      transform:scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <img
      class="badge"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Twitter_Verified_Badge.svg/300px-Twitter_Verified_Badge.svg.png"
      alt="Blue Check"
    />

    <h1>Verified Website</h1>
    <p>Website dengan favicon centang biru 300x300.</p>

    <a href="#" class="btn">Get Started</a>
  </div>

</body>
</html>
