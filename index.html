  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:
      radial-gradient(circle at top,#2563eb 0%,#0f172a 45%,#020617 100%);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
      position:relative;
    }

    .bg-blur{
      position:absolute;
      width:600px;
      height:600px;
      background:#3b82f6;
      border-radius:50%;
      filter:blur(180px);
      opacity:.18;
      top:-250px;
      right:-100px;
    }

    .card{
      width:430px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(20px);
      border-radius:30px;
      padding:45px;
      text-align:center;
      position:relative;
      z-index:5;

      box-shadow:
      0 0 40px rgba(59,130,246,.25),
      inset 0 0 20px rgba(255,255,255,.03);
    }

    .logo{
      width:130px;
      height:130px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:25px;

      box-shadow:
      0 0 45px rgba(59,130,246,.8);

      animation:float 4s ease-in-out infinite;
    }

    h1{
      font-size:45px;
      margin-bottom:12px;
    }

    p{
      color:#cbd5e1;
      line-height:1.7;
      margin-bottom:30px;
      font-size:16px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn{
      padding:14px 30px;
      border-radius:14px;
      text-decoration:none;
      transition:.3s;
      font-weight:bold;
    }

    .primary{
      background:#2563eb;
      color:white;
      box-shadow:0 0 25px rgba(37,99,235,.5);
    }

    .primary:hover{
      background:#3b82f6;
      transform:translateY(-4px);
    }

    .secondary{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:white;
    }

    .secondary:hover{
      background:rgba(255,255,255,.12);
      transform:translateY(-4px);
    }

    .verified{
      margin-top:25px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      color:#60a5fa;
      font-size:14px;
    }

    .verified img{
      width:18px;
      height:18px;
      border-radius:50%;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    @media(max-width:500px){

      .card{
        width:92%;
        padding:35px 25px;
      }

      h1{
        font-size:36px;
      }
